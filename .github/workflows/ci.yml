name: CI

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]
  push:
    branches: [main]

jobs:
  build-and-test:
    name: build-and-test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-15]
    steps:
      - uses: actions/checkout@v6
      - name: Select Swift 6 toolchain
        run: |
          if [ -d /Applications/Xcode_16.2.app ]; then
            sudo xcode-select -s /Applications/Xcode_16.2.app
          fi
      - name: Tool versions
        run: |
          swift --version
          xcodebuild -version
      - name: Build
        run: swift build
      - name: Test
        run: swift test
      - name: CLI smoke
        run: swift run anvil-runner help

  document-registry-policy-check:
    uses: swiftanvil/swiftanvil-enforcement/.github/workflows/document-registry-policy.yml@v1
