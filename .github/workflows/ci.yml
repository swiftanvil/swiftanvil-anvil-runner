name: CI

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]
  push:
    branches: [main]

jobs:
  build-and-test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v6
      - name: Tool versions
        run: |
          swift --version
          xcodebuild -version
      - name: Build
        run: swift build
      - name: Test
        run: swift test

  document-registry-policy-check:
    uses: swiftanvil/swiftanvil-enforcement/.github/workflows/document-registry-policy.yml@v1
