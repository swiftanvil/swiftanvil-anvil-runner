name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build-and-test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: swift build
      - name: Test
        run: swift test

  document-registry-policy-check:
    uses: swiftanvil/swiftanvil-enforcement/.github/workflows/document-registry-policy.yml@v1
